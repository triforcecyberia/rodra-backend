# Server
server.port=8080

# Telegram Bot (значения берутся из .env / переменных окружения)
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
telegram.chat.id=${TELEGRAM_CHAT_ID}

# CORS — разрешаем запросы с GitHub Pages и локального фронта
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://triforcecyberia.github.io,http://localhost:3000,http://127.0.0.1:5500}
